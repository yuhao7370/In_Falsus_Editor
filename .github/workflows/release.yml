name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: In_Falsus_Editor-windows-x64
            binary_name: in_falsus_editor.exe
            final_binary: In Falsus Editor.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: In_Falsus_Editor-linux-x64
            binary_name: in_falsus_editor
            final_binary: In Falsus Editor
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: In_Falsus_Editor-macos-arm64
            binary_name: in_falsus_editor
            final_binary: In Falsus Editor

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libxi-dev libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxext-dev libxfixes-dev libatk1.0-dev libgtk-3-dev libwayland-dev
          pkg-config --libs x11 || true

      - name: Build release
        env:
          RUSTFLAGS: ${{ matrix.os == 'ubuntu-latest' && '-C link-args=-lX11' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/In Falsus Editor"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/In Falsus Editor/${{ matrix.final_binary }}"
          Copy-Item -Recurse "assets" "dist/In Falsus Editor/assets"
          Copy-Item -Recurse "i18n" "dist/In Falsus Editor/i18n"
          Compress-Archive -Path "dist/In Falsus Editor" -DestinationPath "${{ matrix.artifact_name }}.zip"

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p "dist/In Falsus Editor"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/In Falsus Editor/${{ matrix.final_binary }}"
          cp -r assets "dist/In Falsus Editor/assets"
          cp -r i18n "dist/In Falsus Editor/i18n"
          cp icon.png "dist/In Falsus Editor/icon.png"
          cp "In Falsus Editor.desktop" "dist/In Falsus Editor/In Falsus Editor.desktop"
          cd dist && tar czf "../${{ matrix.artifact_name }}.tar.gz" "In Falsus Editor"

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          APP="dist/In Falsus Editor.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"
          # Create .icns from icon.png
          mkdir -p icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          iconutil -c icns icon.iconset -o "$APP/Resources/AppIcon.icns"
          # Create Info.plist
          cat > "$APP/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>In Falsus Editor</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleIdentifier</key>
            <string>com.infalsus.editor</string>
            <key>CFBundleName</key>
            <string>In Falsus Editor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
          </dict>
          </plist>
          EOF
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$APP/MacOS/${{ matrix.final_binary }}"
          cp -r assets "$APP/Resources/assets"
          cp -r i18n "$APP/Resources/i18n"
          cd dist && tar czf "../${{ matrix.artifact_name }}.tar.gz" "In Falsus Editor.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.zip
            ${{ matrix.artifact_name }}.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: In Falsus Editor ${{ inputs.version }}
          draft: false
          prerelease: false
          files: |
            In_Falsus_Editor-windows-x64.zip
            In_Falsus_Editor-linux-x64.tar.gz
            In_Falsus_Editor-macos-arm64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
