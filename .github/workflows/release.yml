name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: In_Falsus_Editor-windows-x64
            binary_name: in_falsus_editor.exe
            final_binary: In Falsus Editor.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: In_Falsus_Editor-linux-x64
            binary_name: in_falsus_editor
            final_binary: In Falsus Editor
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: In_Falsus_Editor-macos-arm64
            binary_name: in_falsus_editor
            final_binary: In Falsus Editor

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libxi-dev libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libatk1.0-dev libgtk-3-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/In Falsus Editor"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/In Falsus Editor/${{ matrix.final_binary }}"
          Copy-Item -Recurse "assets" "dist/In Falsus Editor/assets"
          Copy-Item -Recurse "i18n" "dist/In Falsus Editor/i18n"
          Compress-Archive -Path "dist/In Falsus Editor" -DestinationPath "${{ matrix.artifact_name }}.zip"

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p "dist/In Falsus Editor"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/In Falsus Editor/${{ matrix.final_binary }}"
          cp -r assets "dist/In Falsus Editor/assets"
          cp -r i18n "dist/In Falsus Editor/i18n"
          cd dist && tar czf "../${{ matrix.artifact_name }}.tar.gz" "In Falsus Editor"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.zip
            ${{ matrix.artifact_name }}.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: In Falsus Editor ${{ inputs.version }}
          draft: false
          prerelease: false
          files: |
            In_Falsus_Editor-windows-x64.zip
            In_Falsus_Editor-linux-x64.tar.gz
            In_Falsus_Editor-macos-arm64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
